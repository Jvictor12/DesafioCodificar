services:
  api:
    image: desafio-codificar-api:latest
    build:
      context: .
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      DB_URL: "jdbc:postgresql://database:5432/${POSTGRES_DB:-desafio_codificar}"
      DB_USERNAME: "${POSTGRES_USER:-desafio}"
      DB_PASSWORD: "${POSTGRES_PASSWORD:-desafio}"
      JPA_DDL_AUTO: "${JPA_DDL_AUTO:-update}"
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped

  database:
    image: postgres:17-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-desafio_codificar}"
      POSTGRES_USER: "${POSTGRES_USER:-desafio}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-desafio}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
